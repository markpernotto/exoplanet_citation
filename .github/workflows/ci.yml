name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: exoplanet
          POSTGRES_PASSWORD: exoplanet
          POSTGRES_DB: exoplanet_citation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U exoplanet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply schema
        env:
          PGPASSWORD: exoplanet
        run: psql -h localhost -U exoplanet -d exoplanet_citation_test -f etl/schema.sql

      - name: Lint
        run: ruff check .

      - name: Test
        env:
          DATABASE_URL: postgresql://exoplanet:exoplanet@localhost:5432/exoplanet_citation_test
        run: pytest
