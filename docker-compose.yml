services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: exoplanet
      POSTGRES_PASSWORD: exoplanet
      POSTGRES_DB: exoplanet_citation
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./etl/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exoplanet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
