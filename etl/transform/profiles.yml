# dbt profile for exoplanet_citation.
# Connects via env vars; populate them from your Neon DATABASE_URL in .env.
# This file is committed; the secrets are not.

exoplanet_citation:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST') }}"
      user: "{{ env_var('DBT_USER') }}"
      password: "{{ env_var('DBT_PASSWORD') }}"
      port: "{{ env_var('DBT_PORT', '5432') | int }}"
      dbname: "{{ env_var('DBT_DBNAME') }}"
      schema: "{{ env_var('DBT_SCHEMA', 'public') }}"
      sslmode: require
      threads: 4
      keepalives_idle: 0
